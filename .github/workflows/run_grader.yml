name: WebGrader Automation

on:
  schedule:
    - cron: '0 0 * * *' # รันทุกวันตอน 7 โมงเช้า (UTC+7)
  workflow_dispatch:      # ปุ่มกดรันเองในหน้า Actions

jobs:
  run-grader:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -e .

    - name: Create Credentials JSON
      env:
        GSPREAD_CREDENTIALS: ${{ secrets.GSPREAD_CREDENTIALS }}
      run: |
        python -c "import base64, os; data = os.environ.get('GSPREAD_CREDENTIALS', '').strip(); f = open('credentials.json', 'wb'); f.write(base64.b64decode(data)); f.close()"

    - name: Run WebGrader
      env:
        SpreadSheetID: ${{ secrets.SPREADSHEET_ID }}
        SheetName: ${{ secrets.SHEET_NAME }}
      run: |
        webg
